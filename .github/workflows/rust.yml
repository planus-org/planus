name: CI

env:
  CARGO_TERM_COLOR: always
  # Keep in sync with `EXPECTED_FLATC_VERSION` in test/rust-test-*/build.rs, the pinned
  # `flatbuffers` crate in test/Cargo.toml, and `flatbuffers` in flake.nix.
  FLATBUFFER_VERSION: 25.12.19
  # Force build.rs to hard-fail (rather than warn + skip) if the installed flatc doesn't match,
  # so a future version drift between the crate and the CI-built flatc is caught here.
  PLANUS_REQUIRE_FLATC: "1"

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "32 4 * * 5"
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: ["1.88", stable, beta]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends graphviz
      - uses: actions/checkout@v7.0.0
      - name: Install rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-make from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-make
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Flatbuffers binary cache
        id: flatbuffers-cache
        uses: actions/cache@v6
        with:
          path: ~/flatc
          key: flatbuffers-${{ runner.os }}-${{ env.FLATBUFFER_VERSION }}
      - name: Install flatbuffers
        if: steps.flatbuffers-cache.outputs.cache-hit != 'true'
        run: .github/workflows/build_flatbuffers.sh
      - name: Copy flatbuffers binary to /usr/bin
        run: sudo cp ~/flatc /usr/local/bin/
      - name: Removing 2024 tests when testing our MSRV
        if: matrix.rust == '1.88'
        run: rm -rf test/rust-test-2024
      - run: cargo make full-test
